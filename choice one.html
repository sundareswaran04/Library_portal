<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Library Portal</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-C6RzsynM9kWDrMNeT87bh95OGNyZPhcTNXj1NW7RuBCsyN/o0jlpcV8Qyq46cDfL" crossorigin="anonymous"></script>

</head>
<body>
    <style>
        body{
            background-color:#c0c0c0;
        }
        #header{
            display:flex;
            justify-content:space-between;
            padding:10px;
background-color:#2f4f4f;
color:white;
        }
        #items{
            display:flex;
            justify-content:space-between;
            
        }
#items h4{
    margin:10px;
    font-size:small;
}
#items h4:hover{
    cursor: pointer;
    border-bottom:2px solid black;
}
.dropdown button{
    background-color:white;
    color:black;
}
input{
    /* border-radius:px; */
    border:none;
    height:35px;
    text-align:center;
}
#main-content{
    margin-top:20px;
}
/* #Entry,#Return,#add-student,#add-book{
    color:white;
} */


    </style>

    <div id="header" class="container-fluid">
        <h2>Library Portal</h2>
        <input type="text" id="Search_field" placeholder="Search by Id">
        <div id="items">
            <h4 onclick="entry_form()">Entry</h4>
            <h4 onclick="return_form()">Return a Book</h4>
            <h4 onclick="add_student_form()">Add Student</h4>
            <h4 onclick="add_book_form()">Add Book</h4>
            <div class="dropdown">
                <button class="btn btn-secondary dropdown-toggle" type="button" data-bs-toggle="dropdown" aria-expanded="false">
                  Database
                </button>
                <ul class="dropdown-menu">
                  <li><button class="dropdown-item" type="button">Taken</button></li>
                  <li><button class="dropdown-item" type="button">Returned</button></li>
                  
                </ul>
              </div>
            </select>
        </div>
    </div>
    <div class="container" id="main-content">
        <div class="container" id="Entry">
       
            <form class="row g-3">
                <h4>Entry form</h4>
                <div class="col-md-6">
                   
                  <label for="inputEmail4" class="form-label">Student Id</label>
                  <input type="email" class="form-control" id="inputEmail4">
                </div>
                <div class="col-md-6">
                  <label for="inputPassword4" class="form-label">Student Name</label>
                  <input type="password" class="form-control" id="inputPassword4">
                </div>
                <div class="col-6">
                  <label for="inputAddress" class="form-label">Book Id</label>
                  <input type="text" class="form-control" id="inputAddress" placeholder="lib@345">
                </div>
                <div class="col-6">
                  <label for="inputAddress2" class="form-label">Book Name</label>
                  <input type="text" class="form-control" id="inputAddress2" placeholder="Programming in java">
                </div>
                <!-- <div class="col-md-6">
                  <label for="inputCity" class="form-label">City</label>
                  <input type="text" class="form-control" id="inputCity">
                </div>
                <div class="col-md-4">
                  <label for="inputState" class="form-label">State</label>
                  <select id="inputState" class="form-select">
                    <option selected>Choose...</option>
                    <option>...</option>
                  </select>
                </div>
                <div class="col-md-2">
                  <label for="inputZip" class="form-label">Zip</label>
                  <input type="text" class="form-control" id="inputZip">
                </div>
                <div class="col-12">
                  <div class="form-check">
                    <input class="form-check-input" type="checkbox" id="gridCheck">
                    <label class="form-check-label" for="gridCheck">
                      Check me out
                    </label>
                  </div>
                </div> -->
                <div class="col-12">
                  <button type="submit" class="btn btn-primary">Entry</button>
                </div>
              </form>
        </div>
        <div class="container" id="Return">
            
            <form class="row g-3">
                <h4>Return form</h4>
                <div class="col-md-6">
                  <label for="inputEmail4" class="form-label">Student Id</label>
                  <input type="email" class="form-control" id="inputEmail4">
                </div>
                <div class="col-md-6">
                  <label for="inputPassword4" class="form-label">Book Id</label>
                  <input type="password" class="form-control" id="inputPassword4">
                </div>
               
                <div class="col-12">
                  <button type="submit" class="btn btn-primary">Enter</button>
                </div>
              </form>
    
        </div>
        <div class="container" id="add-student">
            <form class="row g-3">
                <h4>Add Student</h4>
                <div class="col-md-6">
                  <label for="inputEmail4" class="form-label">Student Id</label>
                  <input type="text" class="form-control" id="inputEmail4">
                </div>
                <div class="col-md-6">
                  <label for="inputPassword4" class="form-label">Student Name</label>
                  <input type="text" class="form-control" id="inputPassword4">
                </div>
               
                <div class="col-12">
                  <button type="submit" class="btn btn-primary">Enter</button>
                </div>
              </form>

        </div>
        <div class="container" id="add-book">
            <form class="row g-3">
                <h4>Add Book</h4>
                <div class="col-md-6">
                  <label for="inputEmail4" class="form-label">Book Id</label>
                  <input type="text" class="form-control" id="inputEmail4">
                </div>
                <div class="col-md-6">
                  <label for="inputPassword4" class="form-label">Book Name</label>
                  <input type="text" class="form-control" id="inputPassword4">
                </div>
               
                <div class="col-12">
                  <button type="submit" class="btn btn-primary">Enter</button>
                </div>
              </form>
        </div>

    </div>
   
    <script>
        function entry_form(){
            document.getElementById("add-student").style.display="none";
    document.getElementById("add-book").style.display="none"
    document.getElementById("Entry").style.display="flex";
    document.getElementById("Return").style.display="none";
        }
    entry_form();
        function return_form(){
            document.getElementById("add-student").style.display="none";
    document.getElementById("add-book").style.display="none"
    document.getElementById("Entry").style.display="none";
    document.getElementById("Return").style.display="flex";
        }
function add_student_form(){
    document.getElementById("add-student").style.display="flex";
    document.getElementById("add-book").style.display="none"
    document.getElementById("Entry").style.display="none";
    document.getElementById("Return").style.display="none";
}
function add_book_form(){
    document.getElementById("add-student").style.display="none";
    document.getElementById("add-book").style.display="flex"
    document.getElementById("Entry").style.display="none";
    document.getElementById("Return").style.display="none";
}
    </script>
</body>
</html>
